<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秦岭森林火情智能监测指挥中心</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Leaflet 地图库（CDN引入） -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 大屏专用样式（独立于主系统 styles.css） -->
    <link rel="stylesheet" href="/static/dashboard_large.css">
</head>
<body>
    <!-- ==================== 指挥中心启动动画遮罩 ==================== -->
    <div class="boot-overlay" id="boot-overlay">
        <!-- 科技网格背景 -->
        <div class="boot-grid-bg"></div>
        <!-- 扫描线 -->
        <div class="boot-scan-line"></div>
        <!-- 启动图标 -->
        <div class="boot-icon">
            <div class="boot-hex-ring"></div>
            <div class="boot-icon-text">🔥</div>
        </div>
        <!-- 启动文字 -->
        <div class="boot-text">指挥中心启动中</div>
        <div class="boot-sub-text">COMMAND CENTER INITIALIZING</div>
        <!-- 进度条 -->
        <div class="boot-progress">
            <div class="boot-progress-bar" id="boot-progress-bar"></div>
        </div>
    </div>

    <!-- ==================== 大屏整体容器 ==================== -->
    <div class="large-screen-container" id="large-screen-container">

        <!-- ==================== 顶部标题栏 ==================== -->
        <header class="large-header">
            <!-- 左侧：系统标题 -->
            <div class="header-title-area">
                <div class="header-logo">🔥</div>
                <h1 class="header-title">秦岭森林火情智能监测指挥中心</h1>
            </div>
            <!-- 中间：演示模式按钮 + 状态指示 -->
            <div class="header-center-area">
                <!-- 演示模式 ACTIVE 状态灯（仅演示模式开启时显示） -->
                <div class="demo-active-indicator" id="demo-active-indicator">
                    <span class="demo-active-dot"></span>
                    <span class="demo-active-text">演示模式 ACTIVE</span>
                </div>
                <button class="demo-mode-btn" id="demo-mode-btn" onclick="toggleDemoMode()">
                    <i class="fas fa-rocket"></i>
                    <span>演示模式</span>
                </button>
            </div>
            <!-- 右侧：系统运行信息 -->
            <div class="header-info-area">
                <!-- 当前时间 -->
                <div class="header-info-item">
                    <span class="header-info-label">当前时间</span>
                    <span class="header-info-value" id="header-time">--:--:--</span>
                </div>
                <!-- 今日告警数 -->
                <div class="header-info-item">
                    <span class="header-info-label">今日告警</span>
                    <span class="header-info-value" id="header-alert-count">23</span>
                </div>
                <!-- 系统状态 -->
                <div class="header-info-item">
                    <span class="header-info-label">系统状态</span>
                    <span class="header-info-value">
                        <span class="header-status-dot online"></span>正常运行
                    </span>
                </div>
            </div>
        </header>

        <!-- ==================== 主体内容区域 ==================== -->
        <main class="large-body">

            <!-- ========== 左侧区域：实时告警流 + 监控点状态 ========== -->
            <aside class="left-area">
                <!-- 面板1：实时告警流 -->
                <div class="large-panel" style="flex: 2;">
                    <div class="panel-title">
                        <span class="panel-title-icon">⚡</span>
                        实时告警流
                        <span class="panel-title-line"></span>
                    </div>
                    <div class="panel-content alert-stream-list" id="alert-stream-list">
                        <!-- 告警滚动容器（JS动态填充） -->
                        <div class="alert-scroll-wrapper" id="alert-scroll-wrapper">
                            <!-- 告警项由 JS 动态生成 -->
                        </div>
                    </div>
                </div>

                <!-- 面板2：监控点状态 -->
                <div class="large-panel" style="flex: 1;">
                    <div class="panel-title">
                        <span class="panel-title-icon">📡</span>
                        监控点状态
                        <span class="panel-title-line"></span>
                    </div>
                    <div class="panel-content">
                        <div class="camera-preview-area" id="camera-list">
                            <!-- 监控点由 JS 动态生成 -->
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ========== 中间区域：Leaflet真实地图 ========== -->
            <section class="center-area">
                <div class="large-panel map-panel">
                    <div class="panel-title">
                        <span class="panel-title-icon">🗺️</span>
                        秦岭火情监测地图
                        <span class="panel-title-line"></span>
                    </div>
                    <!-- Leaflet地图容器 -->
                    <div id="map-container">
                        <!-- 雷达扫描动画（覆盖在地图上方） -->
                        <div class="map-radar-overlay" id="map-radar-overlay"></div>
                        <!-- 科技网格背景（由CSS绘制） -->
                        <div class="map-grid-bg"></div>
                        <!-- 四角科技边框装饰 -->
                        <div class="map-corner-decor top-left"></div>
                        <div class="map-corner-decor top-right"></div>
                        <div class="map-corner-decor bottom-left"></div>
                        <div class="map-corner-decor bottom-right"></div>
                        <!-- 地图水平扫描线 -->
                        <div class="map-scan-line-h"></div>
                        <!-- Leaflet地图将挂载在此div -->
                        <div id="leaflet-map"></div>
                    </div>
                </div>
            </section>

            <!-- ========== 右侧区域：统计卡片 + 系统信息 ========== -->
            <aside class="right-area">
                <!-- 面板1：核心统计指标 -->
                <div class="large-panel" style="flex: 2;">
                    <div class="panel-title">
                        <span class="panel-title-icon">📊</span>
                        核心统计指标
                        <span class="panel-title-line"></span>
                    </div>
                    <div class="panel-content">
                        <div class="stats-card-grid" id="stats-card-grid">
                            <!-- 统计卡片由 JS 动态生成 -->
                        </div>
                    </div>
                </div>

                <!-- 面板2：系统运行信息 -->
                <div class="large-panel" style="flex: 1;">
                    <div class="panel-title">
                        <span class="panel-title-icon">⚙️</span>
                        系统运行信息
                        <span class="panel-title-line"></span>
                    </div>
                    <div class="panel-content">
                        <div class="system-info-list" id="system-info-list">
                            <!-- 系统信息由 JS 动态生成 -->
                        </div>
                    </div>
                </div>
            </aside>

        </main>

        <!-- ==================== 底部区域：风险趋势图 ==================== -->
        <footer class="large-footer">
            <div class="footer-panel">
                <div class="panel-title">
                    <span class="panel-title-icon">📈</span>
                    近24小时风险趋势
                    <span class="panel-title-line"></span>
                </div>
                <div class="chart-area">
                    <canvas id="risk-trend-chart"></canvas>
                </div>
            </div>
        </footer>

        <!-- ==================== 底部信息栏 ==================== -->
        <div class="large-bottom-bar">
            <span class="bottom-bar-item">🏔️ 秦岭森林火情智能监测系统 v1.0.0</span>
            <span class="bottom-bar-item">📡 AI模型：CNN火灾检测 · 4类识别</span>
            <span class="bottom-bar-item">⏰ 系统启动时间：<span id="system-start-time">--</span></span>
        </div>

    </div>

    <!-- 大屏交互逻辑JS（静态模拟数据 + Chart.js图表） -->
    <script src="/static/dashboard_large.js"></script>
</body>
</html>
