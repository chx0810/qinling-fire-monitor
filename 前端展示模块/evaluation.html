<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秦岭火灾预警系统 - 模型评估</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* ==================== 评估页面专用样式 ==================== */
        .eval-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .eval-header h1 {
            font-size: 1.6rem;
            color: var(--primary-red);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: linear-gradient(135deg, var(--bg-card-light), var(--bg-card));
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            color: var(--primary-red);
            border-color: var(--primary-red);
            transform: translateY(-2px);
        }

        /* 总体指标卡片 */
        .metrics-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .metric-card:nth-child(1)::before { background: linear-gradient(90deg, var(--primary-red), var(--primary-orange)); }
        .metric-card:nth-child(2)::before { background: linear-gradient(90deg, var(--info-blue), #4D96FF); }
        .metric-card:nth-child(3)::before { background: linear-gradient(90deg, var(--success-green), #7BED9F); }
        .metric-card:nth-child(4)::before { background: linear-gradient(90deg, var(--warning-yellow), #FFA502); }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .metric-card .metric-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .metric-card:nth-child(1) .metric-icon { color: var(--primary-red); }
        .metric-card:nth-child(2) .metric-icon { color: var(--info-blue); }
        .metric-card:nth-child(3) .metric-icon { color: var(--success-green); }
        .metric-card:nth-child(4) .metric-icon { color: var(--warning-yellow); }

        .metric-card .metric-value {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .metric-card:nth-child(1) .metric-value { color: var(--primary-red); }
        .metric-card:nth-child(2) .metric-value { color: var(--info-blue); }
        .metric-card:nth-child(3) .metric-value { color: var(--success-green); }
        .metric-card:nth-child(4) .metric-value { color: var(--warning-yellow); }

        .metric-card .metric-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 图表区域 */
        .eval-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 1200px) {
            .eval-grid {
                grid-template-columns: 1fr;
            }
            .metrics-summary {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .metrics-summary {
                grid-template-columns: 1fr;
            }
        }

        .eval-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .eval-card h3 {
            font-size: 1.2rem;
            color: var(--primary-red);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .eval-chart-container {
            position: relative;
            height: 320px;
        }

        /* 混淆矩阵热力图 */
        .confusion-matrix {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .confusion-matrix th,
        .confusion-matrix td {
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .confusion-matrix th {
            background: var(--bg-card-light);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .confusion-matrix .diagonal {
            color: #fff;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .confusion-matrix .off-diagonal {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .matrix-note {
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* 分类报告表格 */
        .report-table {
            width: 100%;
            border-collapse: collapse;
        }

        .report-table th,
        .report-table td {
            padding: 14px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .report-table th {
            background: var(--bg-card-light);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .report-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .report-table td:first-child {
            text-align: left;
            font-weight: 600;
            color: var(--primary-orange);
        }

        .report-table .highlight-row {
            background: rgba(255, 56, 56, 0.05);
        }

        /* 加载状态 */
        .eval-loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .eval-loading i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary-red);
            animation: spin 1.5s linear infinite;
        }

        .eval-loading p {
            font-size: 1.1rem;
        }

        /* 错误状态 */
        .eval-error {
            text-align: center;
            padding: 60px 20px;
            color: var(--critical-color);
        }

        .eval-error i {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* 训练曲线卡片全宽 */
        .eval-full-width {
            grid-column: 1 / -1;
        }

        /* 训练信息栏 */
        .training-info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .training-info-item {
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .training-info-item i {
            color: var(--primary-orange);
        }

        .training-info-item span {
            color: var(--text-secondary);
        }

        .training-info-item strong {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 页面头部 -->
        <div class="modern-header">
            <div class="header-content">
                <div class="logo-section">
                    <i class="fas fa-fire"></i>
                    <h1>秦岭火灾预警系统</h1>
                    <span class="version-badge">模型评估 v1.0</span>
                </div>
                <div class="system-status">
                    <a href="/dashboard" class="back-btn">
                        <i class="fas fa-arrow-left"></i> 返回仪表板
                    </a>
                </div>
            </div>
        </div>

        <!-- 总体指标卡片 -->
        <div class="metrics-summary" id="metrics-summary">
            <div class="metric-card">
                <div class="metric-icon"><i class="fas fa-bullseye"></i></div>
                <div class="metric-value" id="accuracy-value">--</div>
                <div class="metric-label">验证集准确率</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon"><i class="fas fa-crosshairs"></i></div>
                <div class="metric-value" id="precision-value">--</div>
                <div class="metric-label">平均精确率</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon"><i class="fas fa-search"></i></div>
                <div class="metric-value" id="recall-value">--</div>
                <div class="metric-label">平均召回率</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon"><i class="fas fa-calculator"></i></div>
                <div class="metric-value" id="f1-value">--</div>
                <div class="metric-label">平均F1分数</div>
            </div>
        </div>

        <!-- 训练信息栏 -->
        <div class="training-info-bar" id="training-info-bar">
            <div class="training-info-item">
                <i class="fas fa-sync-alt"></i>
                <span>训练轮数：</span><strong id="total-epochs">72 轮</strong>
            </div>
            <div class="training-info-item">
                <i class="fas fa-database"></i>
                <span>评估样本：</span><strong id="total-samples">1428 个</strong>
            </div>
            <div class="training-info-item">
                <i class="fas fa-th-list"></i>
                <span>分类类别：</span><strong id="total-classes">--</strong>
            </div>
            <div class="training-info-item">
                <i class="fas fa-clock"></i>
                <span>模型版本：</span><strong>CNN v1.0</strong>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="eval-grid">
            <!-- 混淆矩阵 -->
            <div class="eval-card">
                <h3><i class="fas fa-th"></i> 混淆矩阵</h3>
                <div id="confusion-matrix-container">
                    <table class="confusion-matrix">
                        <tr><th>真实 \ 预测</th><th>火灾</th><th>烟雾</th><th>火灾+烟雾</th><th>正常</th></tr>
                        <tr><th>火灾</th><td class="diagonal" style="background:rgba(0, 220, 80, 0.85)">352</td><td class="off-diagonal" style="background:rgba(20, 20, 20, 0.6)">11</td><td class="off-diagonal" style="background:rgba(5, 20, 20, 0.6)">2</td><td class="off-diagonal" style="background:rgba(3, 20, 20, 0.6)">1</td></tr>
                        <tr><th>烟雾</th><td class="off-diagonal" style="background:rgba(36, 20, 20, 0.6)">14</td><td class="diagonal" style="background:rgba(0, 211, 80, 0.85)">331</td><td class="off-diagonal" style="background:rgba(14, 20, 20, 0.6)">5</td><td class="off-diagonal" style="background:rgba(7, 20, 20, 0.6)">2</td></tr>
                        <tr><th>火灾+烟雾</th><td class="off-diagonal" style="background:rgba(8, 20, 20, 0.6)">3</td><td class="off-diagonal" style="background:rgba(10, 20, 20, 0.6)">4</td><td class="diagonal" style="background:rgba(0, 217, 80, 0.85)">347</td><td class="off-diagonal" style="background:rgba(21, 20, 20, 0.6)">8</td></tr>
                        <tr><th>正常</th><td class="off-diagonal" style="background:rgba(3, 20, 20, 0.6)">1</td><td class="off-diagonal" style="background:rgba(5, 20, 20, 0.6)">2</td><td class="off-diagonal" style="background:rgba(16, 20, 20, 0.6)">6</td><td class="diagonal" style="background:rgba(0, 212, 80, 0.85)">339</td></tr>
                    </table>
                    <div class="matrix-note">行表示真实类别，列表示预测类别。对角线值越高表示分类越准确。</div>
                </div>
            </div>

            <!-- 各类别指标柱状图 -->
            <div class="eval-card">
                <h3><i class="fas fa-chart-bar"></i> 各类别评估指标</h3>
                <div class="eval-chart-container">
                    <canvas id="metrics-bar-chart"></canvas>
                </div>
            </div>

            <!-- 训练曲线 - 准确率 -->
            <div class="eval-card">
                <h3><i class="fas fa-chart-line"></i> 训练准确率曲线</h3>
                <div class="eval-chart-container">
                    <canvas id="accuracy-chart"></canvas>
                </div>
            </div>

            <!-- 训练曲线 - 损失 -->
            <div class="eval-card">
                <h3><i class="fas fa-chart-area"></i> 训练损失曲线</h3>
                <div class="eval-chart-container">
                    <canvas id="loss-chart"></canvas>
                </div>
            </div>

            <!-- 分类报告表格 -->
            <div class="eval-card eval-full-width">
                <h3><i class="fas fa-table"></i> 分类报告</h3>
                <div id="classification-report-container">
                    <div class="eval-loading">
                        <i class="fas fa-spinner"></i>
                        <p>加载分类报告数据中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载评估脚本 -->
    <script src="/static/evaluation.js"></script>
</body>
</html>
